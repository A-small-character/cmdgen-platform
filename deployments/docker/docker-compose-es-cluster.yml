# ============================================================
# 智能命令生成平台 - 双 ES 集群（Security + 统一 P12 证书，CCR-Ready）
# ============================================================
# 集群 A (cmdgen-a): es-a1/a2/a3  -> 主集群, HTTP 9200, Kibana 5601
# 集群 B (cmdgen-b): es-b1/b2/b3  -> 备集群, HTTP 9201, Kibana 5602
#
# 证书方案（为 CCR 统一）:
#   - 单一 CA: elastic-stack-ca.p12
#   - 单一节点证书: elastic-certificates.p12  ← 两集群全部 6 节点共用同一个 P12
#   - 因所有节点共享同一证书, 两集群 transport 层天然互信, CCR 跨集群连接直接可建
#   - verification_mode=certificate（验证 CA 签发, 不校验主机名）
#
# 安全:
#   - xpack.security.enabled=true
#   - transport.ssl 节点间 TLS（P12 keystore/truststore）
#   - http.ssl 关闭, HTTP 明文 + 密码认证（本地访问简化）
#   - elastic / ${ELASTIC_PASSWORD}      kibana_system / ${KIBANA_PASSWORD}
#
# 默认密码（生产改 .env）: ELASTIC_PASSWORD=Cmdgen@ES2024  KIBANA_PASSWORD=Cmdgen@KB2024
# CCR 搭建（后期）: 见 scripts/setup_ccr.ps1
#
# 启动: docker compose -f deployments/docker/docker-compose-es-cluster.yml up -d
# 清空: docker compose -f deployments/docker/docker-compose-es-cluster.yml down -v
# ============================================================

x-es-common: &es-common
  image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
  ulimits:
    memlock: { soft: -1, hard: -1 }
    nofile:  { soft: 65536, hard: 65536 }
  deploy:
    resources:
      limits:
        memory: 1500M
  restart: unless-stopped

# 统一的 transport TLS 配置锚点（所有节点共用同一 P12）
# 注: environment 为列表无法用 merge key, 故每节点重复以下 4 行（内容完全一致）
#   - xpack.security.transport.ssl.enabled=true
#   - xpack.security.transport.ssl.verification_mode=certificate
#   - xpack.security.transport.ssl.keystore.path=certs/elastic-certificates.p12
#   - xpack.security.transport.ssl.truststore.path=certs/elastic-certificates.p12

services:
  # ── 证书与密码初始化 ─────────────────────────────────────
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: cmdgen-es-setup
    user: "0"
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-Cmdgen@ES2024}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD:-Cmdgen@KB2024}
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    command: >
      bash -c '
        set -e;
        if [ ! -f config/certs/elastic-certificates.p12 ]; then
          echo "==> 生成统一 CA (P12)";
          bin/elasticsearch-certutil ca --silent --out config/certs/elastic-stack-ca.p12 --pass "";
          echo "==> 生成统一节点证书 (P12, 两集群共用)";
          bin/elasticsearch-certutil cert --silent --ca config/certs/elastic-stack-ca.p12 --ca-pass "" --out config/certs/elastic-certificates.p12 --pass "";
          chown -R 1000:0 config/certs;
          chmod 640 config/certs/*.p12;
        fi;
        echo "==> 等待主集群 es-a1";
        until curl -s http://es-a1:9200 >/dev/null; do sleep 3; done;
        echo "==> 设置主集群 kibana_system 密码";
        until curl -s -X POST -u "elastic:$${ELASTIC_PASSWORD}" -H "Content-Type: application/json" http://es-a1:9200/_security/user/kibana_system/_password -d "{\"password\":\"$${KIBANA_PASSWORD}\"}" | grep -q "^{}"; do sleep 5; done;
        echo "==> 等待备集群 es-b1";
        until curl -s http://es-b1:9200 >/dev/null; do sleep 3; done;
        echo "==> 设置备集群 kibana_system 密码";
        until curl -s -X POST -u "elastic:$${ELASTIC_PASSWORD}" -H "Content-Type: application/json" http://es-b1:9200/_security/user/kibana_system/_password -d "{\"password\":\"$${KIBANA_PASSWORD}\"}" | grep -q "^{}"; do sleep 5; done;
        echo "==> Setup 完成（统一 P12 证书就绪, CCR-Ready）";
        sleep infinity;
      '
    healthcheck:
      test: ["CMD-SHELL", "[ -f config/certs/elastic-certificates.p12 ]"]
      interval: 5s
      timeout: 5s
      retries: 120
    networks: [es-net]

  # ── 集群 A: cmdgen-a (主) ────────────────────────────────
  es-a1:
    <<: *es-common
    container_name: es-a1
    depends_on: { setup: { condition: service_healthy } }
    environment:
      - node.name=es-a1
      - cluster.name=cmdgen-a
      - discovery.seed_hosts=es-a2,es-a3
      - cluster.initial_master_nodes=es-a1,es-a2,es-a3
      - node.roles=master,data,ingest,remote_cluster_client
      - bootstrap.memory_lock=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-Cmdgen@ES2024}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.keystore.path=certs/elastic-certificates.p12
      - xpack.security.transport.ssl.truststore.path=certs/elastic-certificates.p12
      - "ES_JAVA_OPTS=-Xms768m -Xmx768m"
    ports: ["9200:9200"]
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - es_a1_data:/usr/share/elasticsearch/data
    networks: [es-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD:-Cmdgen@ES2024} http://localhost:9200/_cluster/health | grep -qE 'green|yellow' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  es-a2:
    <<: *es-common
    container_name: es-a2
    depends_on: { setup: { condition: service_healthy } }
    environment:
      - node.name=es-a2
      - cluster.name=cmdgen-a
      - discovery.seed_hosts=es-a1,es-a3
      - cluster.initial_master_nodes=es-a1,es-a2,es-a3
      - node.roles=master,data,ingest,remote_cluster_client
      - bootstrap.memory_lock=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-Cmdgen@ES2024}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.keystore.path=certs/elastic-certificates.p12
      - xpack.security.transport.ssl.truststore.path=certs/elastic-certificates.p12
      - "ES_JAVA_OPTS=-Xms768m -Xmx768m"
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - es_a2_data:/usr/share/elasticsearch/data
    networks: [es-net]

  es-a3:
    <<: *es-common
    container_name: es-a3
    depends_on: { setup: { condition: service_healthy } }
    environment:
      - node.name=es-a3
      - cluster.name=cmdgen-a
      - discovery.seed_hosts=es-a1,es-a2
      - cluster.initial_master_nodes=es-a1,es-a2,es-a3
      - node.roles=master,data,ingest,remote_cluster_client
      - bootstrap.memory_lock=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-Cmdgen@ES2024}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.keystore.path=certs/elastic-certificates.p12
      - xpack.security.transport.ssl.truststore.path=certs/elastic-certificates.p12
      - "ES_JAVA_OPTS=-Xms768m -Xmx768m"
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - es_a3_data:/usr/share/elasticsearch/data
    networks: [es-net]

  # ── 集群 B: cmdgen-b (备) ────────────────────────────────
  es-b1:
    <<: *es-common
    container_name: es-b1
    depends_on: { setup: { condition: service_healthy } }
    environment:
      - node.name=es-b1
      - cluster.name=cmdgen-b
      - discovery.seed_hosts=es-b2,es-b3
      - cluster.initial_master_nodes=es-b1,es-b2,es-b3
      - node.roles=master,data,ingest,remote_cluster_client
      - bootstrap.memory_lock=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-Cmdgen@ES2024}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.keystore.path=certs/elastic-certificates.p12
      - xpack.security.transport.ssl.truststore.path=certs/elastic-certificates.p12
      - "ES_JAVA_OPTS=-Xms768m -Xmx768m"
    ports: ["9201:9200"]
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - es_b1_data:/usr/share/elasticsearch/data
    networks: [es-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD:-Cmdgen@ES2024} http://localhost:9200/_cluster/health | grep -qE 'green|yellow' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  es-b2:
    <<: *es-common
    container_name: es-b2
    depends_on: { setup: { condition: service_healthy } }
    environment:
      - node.name=es-b2
      - cluster.name=cmdgen-b
      - discovery.seed_hosts=es-b1,es-b3
      - cluster.initial_master_nodes=es-b1,es-b2,es-b3
      - node.roles=master,data,ingest,remote_cluster_client
      - bootstrap.memory_lock=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-Cmdgen@ES2024}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.keystore.path=certs/elastic-certificates.p12
      - xpack.security.transport.ssl.truststore.path=certs/elastic-certificates.p12
      - "ES_JAVA_OPTS=-Xms768m -Xmx768m"
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - es_b2_data:/usr/share/elasticsearch/data
    networks: [es-net]

  es-b3:
    <<: *es-common
    container_name: es-b3
    depends_on: { setup: { condition: service_healthy } }
    environment:
      - node.name=es-b3
      - cluster.name=cmdgen-b
      - discovery.seed_hosts=es-b1,es-b2
      - cluster.initial_master_nodes=es-b1,es-b2,es-b3
      - node.roles=master,data,ingest,remote_cluster_client
      - bootstrap.memory_lock=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-Cmdgen@ES2024}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.keystore.path=certs/elastic-certificates.p12
      - xpack.security.transport.ssl.truststore.path=certs/elastic-certificates.p12
      - "ES_JAVA_OPTS=-Xms768m -Xmx768m"
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - es_b3_data:/usr/share/elasticsearch/data
    networks: [es-net]

  # ── Kibana A: 连主集群 ───────────────────────────────────
  kibana-a:
    image: docker.elastic.co/kibana/kibana:9.0.0
    container_name: cmdgen-kibana-a
    depends_on: { es-a1: { condition: service_healthy } }
    environment:
      - SERVERNAME=kibana-a
      - ELASTICSEARCH_HOSTS=http://es-a1:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD:-Cmdgen@KB2024}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=cmdgenA_kibana_32bytes_secret_key_001
    ports: ["5601:5601"]
    networks: [es-net]
    restart: unless-stopped

  # ── Kibana B: 连备集群 ───────────────────────────────────
  kibana-b:
    image: docker.elastic.co/kibana/kibana:9.0.0
    container_name: cmdgen-kibana-b
    depends_on: { es-b1: { condition: service_healthy } }
    environment:
      - SERVERNAME=kibana-b
      - ELASTICSEARCH_HOSTS=http://es-b1:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD:-Cmdgen@KB2024}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=cmdgenB_kibana_32bytes_secret_key_002
    ports: ["5602:5601"]
    networks: [es-net]
    restart: unless-stopped

volumes:
  certs:
  es_a1_data:
  es_a2_data:
  es_a3_data:
  es_b1_data:
  es_b2_data:
  es_b3_data:

networks:
  es-net:
    driver: bridge
