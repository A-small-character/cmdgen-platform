knowledge_items:

  - title: "用户与权限管理"
    type: mysql
    tags: [user, grant, privilege, create, password, authentication]
    source: "MySQL 8.0 官方参考手册 - 用户账户管理"
    source_url: "https://dev.mysql.com/doc/refman/8.0/en/user-account-management.html"
    version: "5.7,8.0,8.4"
    content: |
      # MySQL 用户与权限管理
      # 官方文档: https://dev.mysql.com/doc/refman/8.0/en/user-account-management.html
      # CREATE USER: https://dev.mysql.com/doc/refman/8.0/en/create-user.html
      # GRANT: https://dev.mysql.com/doc/refman/8.0/en/grant.html

      ## 创建用户
      # MySQL 8.0+：推荐 caching_sha2_password 认证插件（默认）
      CREATE USER 'appuser'@'%' IDENTIFIED BY 'StrongPass123!';
      CREATE USER 'appuser'@'localhost' IDENTIFIED BY 'StrongPass123!';
      # 兼容旧客户端（如 MySQL 5.x 客户端）使用 mysql_native_password
      CREATE USER 'appuser'@'%' IDENTIFIED WITH mysql_native_password BY 'StrongPass123!';

      ## 授权
      # 完整权限（单个数据库）
      GRANT ALL PRIVILEGES ON mydb.* TO 'appuser'@'%';
      # 只读权限
      GRANT SELECT ON mydb.* TO 'readonly'@'%';
      # 只读特定表
      GRANT SELECT ON mydb.orders TO 'report'@'%';
      # 指定权限
      GRANT SELECT, INSERT, UPDATE, DELETE ON mydb.* TO 'appuser'@'%';
      # 全部权限（谨慎，相当于root）
      GRANT ALL PRIVILEGES ON *.* TO 'admin'@'%' WITH GRANT OPTION;
      # 刷新权限（修改授权表后执行）
      FLUSH PRIVILEGES;

      ## 查看用户和权限
      SELECT user, host, plugin, authentication_string FROM mysql.user;
      SHOW GRANTS FOR 'appuser'@'%';
      SELECT CURRENT_USER();            # 查看当前连接的用户

      ## 修改密码
      ALTER USER 'appuser'@'%' IDENTIFIED BY 'NewPass456!';
      # MySQL 5.7 兼容方式
      SET PASSWORD FOR 'appuser'@'%' = PASSWORD('NewPass456!');

      ## 撤销权限
      REVOKE SELECT ON mydb.* FROM 'readonly'@'%';
      REVOKE ALL PRIVILEGES ON mydb.* FROM 'appuser'@'%';

      ## 删除用户
      DROP USER 'appuser'@'%';

  - title: "数据库和表管理"
    type: mysql
    tags: [database, table, create, alter, drop, schema, charset]
    source: "MySQL 8.0 官方参考手册 - DDL"
    source_url: "https://dev.mysql.com/doc/refman/8.0/en/sql-data-definition-statements.html"
    version: "5.7,8.0,8.4"
    content: |
      # 数据库和表管理（DDL）
      # 官方文档: https://dev.mysql.com/doc/refman/8.0/en/create-database.html

      ## 数据库操作
      CREATE DATABASE mydb CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      # utf8mb4 支持完整 Unicode 包括 Emoji（utf8 是 MySQL 的"假utf8"，只有3字节）
      SHOW DATABASES;
      USE mydb;
      SELECT DATABASE();               # 查看当前数据库
      DROP DATABASE mydb;              # 危险！不可恢复
      ALTER DATABASE mydb CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

      ## 表操作
      SHOW TABLES;
      SHOW TABLES FROM mydb;
      DESCRIBE orders;                 # 或 DESC orders; 查看表结构
      SHOW CREATE TABLE orders\G       # 显示建表语句
      SHOW INDEX FROM orders;          # 查看索引

      ## 创建表（InnoDB，含常见字段类型）
      CREATE TABLE orders (
        id          BIGINT UNSIGNED NOT NULL AUTO_INCREMENT,
        user_id     BIGINT UNSIGNED NOT NULL,
        status      TINYINT NOT NULL DEFAULT 0 COMMENT '0=pending 1=paid 2=shipped',
        amount      DECIMAL(10,2) NOT NULL DEFAULT 0.00,
        note        VARCHAR(500) DEFAULT NULL,
        created_at  DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
        updated_at  DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        PRIMARY KEY (id),
        KEY idx_user_id (user_id),
        KEY idx_status_created (status, created_at)
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci
        COMMENT='订单表';

      ## ALTER TABLE（常用操作）
      ALTER TABLE orders ADD COLUMN remark TEXT DEFAULT NULL AFTER note;
      ALTER TABLE orders MODIFY COLUMN note VARCHAR(1000) DEFAULT NULL;
      ALTER TABLE orders DROP COLUMN remark;
      ALTER TABLE orders ADD INDEX idx_amount (amount);
      ALTER TABLE orders DROP INDEX idx_amount;
      ALTER TABLE orders RENAME TO order_records;

      ## MySQL 8.0 在线 DDL（Online DDL，大表推荐）
      # 添加索引（默认 INPLACE，不锁表）
      ALTER TABLE orders ADD INDEX idx_user_status (user_id, status), ALGORITHM=INPLACE, LOCK=NONE;
      # 修改列（需要 COPY 方式时会锁表，改用 pt-online-schema-change 或 gh-ost）

  - title: "备份与恢复 - mysqldump"
    type: mysql
    tags: [backup, restore, mysqldump, dump, import, export]
    source: "MySQL 8.0 官方参考手册 - mysqldump"
    source_url: "https://dev.mysql.com/doc/refman/8.0/en/mysqldump.html"
    version: "5.7,8.0,8.4"
    content: |
      # MySQL 备份与恢复（mysqldump）
      # 官方文档: https://dev.mysql.com/doc/refman/8.0/en/mysqldump.html

      ## 备份单个数据库
      mysqldump -u root -p \
        --single-transaction \
        --routines \
        --triggers \
        --hex-blob \
        mydb > /backup/mydb_$(date +%Y%m%d_%H%M%S).sql
      # --single-transaction: InnoDB 热备（一致性快照，不锁表）
      # --routines:           备份存储过程和函数
      # --triggers:           备份触发器（默认包含，显式指定更清晰）
      # --hex-blob:           BLOB/BINARY 列用 HEX 表示（避免字符集问题）

      ## 备份并压缩
      mysqldump -u root -p --single-transaction --routines --triggers mydb \
        | gzip > /backup/mydb_$(date +%Y%m%d_%H%M%S).sql.gz

      ## 备份所有数据库
      mysqldump -u root -p \
        --all-databases \
        --single-transaction \
        --routines \
        --triggers \
        --events \
        > /backup/all_dbs_$(date +%Y%m%d).sql
      # --events: 备份计划事件

      ## 只备份表结构（不含数据）
      mysqldump -u root -p --no-data mydb > /backup/mydb_schema.sql

      ## 只备份数据（不含建表语句）
      mysqldump -u root -p --no-create-info mydb orders > /backup/orders_data.sql

      ## 恢复单个数据库
      mysql -u root -p mydb < /backup/mydb_20240101_020000.sql

      ## 恢复压缩备份
      gunzip < /backup/mydb_20240101.sql.gz | mysql -u root -p mydb

      ## 导入大文件优化
      mysql -u root -p --max_allowed_packet=512M mydb < large_backup.sql

  - title: "主从复制 - GTID 模式"
    type: mysql
    tags: [replication, master, slave, gtid, binlog, replica]
    source: "MySQL 8.0 官方参考手册 - 复制"
    source_url: "https://dev.mysql.com/doc/refman/8.0/en/replication.html"
    version: "5.7,8.0,8.4"
    content: |
      # MySQL 主从复制（GTID 模式）
      # 官方文档: https://dev.mysql.com/doc/refman/8.0/en/replication-gtids.html

      ## 主库配置（my.cnf / my.ini）
      # [mysqld]
      # server-id = 1
      # log-bin = mysql-bin
      # binlog-format = ROW                 # ROW 是 GTID 推荐格式
      # gtid-mode = ON
      # enforce-gtid-consistency = ON
      # log-slave-updates = ON              # MySQL 8.0 中是 log_replica_updates
      # binlog-expire-logs-seconds = 604800 # 7天（MySQL 8.0.1+，旧版用 expire_logs_days）

      ## 从库配置（my.cnf）
      # [mysqld]
      # server-id = 2
      # gtid-mode = ON
      # enforce-gtid-consistency = ON
      # log-slave-updates = ON
      # read-only = ON                      # 从库设为只读
      # super-read-only = ON               # 防止 super 权限用户也写入（MySQL 5.7.8+）

      ## 主库：创建复制用户
      CREATE USER 'replicator'@'%' IDENTIFIED BY 'ReplicaPass123!';
      GRANT REPLICATION SLAVE ON *.* TO 'replicator'@'%';
      FLUSH PRIVILEGES;

      ## 主库：获取当前状态
      SHOW MASTER STATUS\G
      # 记录 File 和 Position（非GTID时使用）

      ## 从库：配置复制（MySQL 8.0.23+ 使用 SOURCE 替代 MASTER）
      CHANGE REPLICATION SOURCE TO
        SOURCE_HOST='192.168.1.100',
        SOURCE_PORT=3306,
        SOURCE_USER='replicator',
        SOURCE_PASSWORD='ReplicaPass123!',
        SOURCE_AUTO_POSITION=1;         # 使用 GTID 自动定位

      ## MySQL 5.7 / 8.0.22 及以下写法
      CHANGE MASTER TO
        MASTER_HOST='192.168.1.100',
        MASTER_PORT=3306,
        MASTER_USER='replicator',
        MASTER_PASSWORD='ReplicaPass123!',
        MASTER_AUTO_POSITION=1;

      ## 启动/停止复制
      START REPLICA;           # MySQL 8.0.22+（旧版用 START SLAVE）
      STOP REPLICA;
      START SLAVE;             # MySQL 5.7 / 8.0.22以下
      STOP SLAVE;

      ## 查看复制状态
      SHOW REPLICA STATUS\G    # MySQL 8.0.22+
      SHOW SLAVE STATUS\G      # MySQL 5.7 / 8.0.22以下
      # 关注字段:
      # Replica_IO_Running / Slave_IO_Running: Yes
      # Replica_SQL_Running / Slave_SQL_Running: Yes
      # Seconds_Behind_Source / Seconds_Behind_Master: 0（延迟秒数）
      # Last_Error: 空（无错误）

  - title: "性能优化 - EXPLAIN 和慢查询"
    type: mysql
    tags: [explain, slow-query, performance, index, optimization, query]
    source: "MySQL 8.0 官方参考手册 - EXPLAIN"
    source_url: "https://dev.mysql.com/doc/refman/8.0/en/explain.html"
    version: "5.7,8.0,8.4"
    content: |
      # MySQL 性能优化
      # EXPLAIN: https://dev.mysql.com/doc/refman/8.0/en/explain.html
      # 慢查询: https://dev.mysql.com/doc/refman/8.0/en/slow-query-log.html

      ## EXPLAIN 执行计划分析
      EXPLAIN SELECT * FROM orders WHERE user_id = 100;
      EXPLAIN FORMAT=JSON SELECT * FROM orders WHERE user_id = 100;  # 更详细
      EXPLAIN ANALYZE SELECT * FROM orders WHERE user_id = 100;      # 实际执行（MySQL 8.0.18+）

      # EXPLAIN 关键字段说明:
      # type（从好到差）:
      #   system > const > eq_ref > ref > range > index > ALL
      #   ALL 表示全表扫描，需要添加索引优化
      # key: 实际使用的索引（NULL 表示未使用索引）
      # rows: 估计需要扫描的行数（越小越好）
      # Extra:
      #   Using index      - 覆盖索引（最优）
      #   Using where      - 有 WHERE 过滤（在 engine 层过滤后还要 server 层过滤）
      #   Using filesort   - 需要额外排序（尽量避免）
      #   Using temporary  - 使用临时表（尽量避免）

      ## 慢查询日志配置
      # my.cnf 配置（永久）
      # slow_query_log = ON
      # slow_query_log_file = /var/log/mysql/slow.log
      # long_query_time = 1               # 超过1秒记录
      # log_queries_not_using_indexes = ON # 未使用索引的查询也记录

      # 动态开启（无需重启，重启后失效）
      SET GLOBAL slow_query_log = 'ON';
      SET GLOBAL long_query_time = 1;
      SET GLOBAL log_queries_not_using_indexes = 'ON';
      SHOW VARIABLES LIKE 'slow_query_log_file';  # 查看日志路径

      ## 分析慢查询日志（mysqldumpslow）
      mysqldumpslow -s t -t 10 /var/log/mysql/slow.log    # 按总时间排序取前10
      mysqldumpslow -s c -t 10 /var/log/mysql/slow.log    # 按出现次数排序
      mysqldumpslow -s r -t 10 /var/log/mysql/slow.log    # 按返回行数排序

      ## 查看当前正在执行的 SQL（找慢查询）
      SHOW PROCESSLIST;
      SHOW FULL PROCESSLIST;            # 显示完整 SQL
      SELECT * FROM information_schema.processlist WHERE command != 'Sleep' ORDER BY time DESC;

      ## 索引优化
      # 查看表的索引使用情况（MySQL 8.0）
      SELECT * FROM sys.schema_unused_indexes WHERE object_schema = 'mydb';

  - title: "常用状态和监控查询"
    type: mysql
    tags: [status, monitoring, variables, connections, locks, innodb]
    source: "MySQL 8.0 官方参考手册 - SHOW STATUS"
    source_url: "https://dev.mysql.com/doc/refman/8.0/en/show-status.html"
    version: "5.7,8.0,8.4"
    content: |
      # MySQL 状态监控
      # 官方文档: https://dev.mysql.com/doc/refman/8.0/en/show-status.html

      ## 连接和线程
      SHOW STATUS LIKE 'Threads_connected';   # 当前连接数
      SHOW STATUS LIKE 'Max_used_connections'; # 历史最大连接数
      SHOW VARIABLES LIKE 'max_connections';   # 最大连接数配置
      SHOW STATUS LIKE 'Connection_errors%';   # 连接错误统计

      ## 查询统计
      SHOW STATUS LIKE 'Questions';           # 总查询数
      SHOW STATUS LIKE 'Com_select';          # SELECT 数量
      SHOW STATUS LIKE 'Com_insert';          # INSERT 数量
      SHOW STATUS LIKE 'Slow_queries';        # 慢查询数量

      ## InnoDB 状态
      SHOW ENGINE INNODB STATUS\G             # InnoDB 详细状态（含死锁信息）
      SHOW STATUS LIKE 'InnoDB_buffer_pool%'; # Buffer Pool 命中率

      ## 查看表大小（前10大表）
      SELECT
        table_schema AS `db`,
        table_name,
        ROUND(data_length / 1024 / 1024, 2)  AS `data_MB`,
        ROUND(index_length / 1024 / 1024, 2) AS `index_MB`,
        ROUND((data_length + index_length) / 1024 / 1024, 2) AS `total_MB`,
        table_rows
      FROM information_schema.tables
      WHERE table_schema NOT IN ('information_schema', 'mysql', 'performance_schema', 'sys')
      ORDER BY data_length + index_length DESC
      LIMIT 10;

      ## 查看当前锁等待
      SELECT
        r.trx_id waiting_trx_id,
        r.trx_mysql_thread_id waiting_thread,
        r.trx_query waiting_query,
        b.trx_id blocking_trx_id,
        b.trx_mysql_thread_id blocking_thread
      FROM information_schema.innodb_lock_waits w
      INNER JOIN information_schema.innodb_trx b ON b.trx_id = w.blocking_trx_id
      INNER JOIN information_schema.innodb_trx r ON r.trx_id = w.requesting_trx_id;

      ## 查看变量配置
      SHOW VARIABLES LIKE 'innodb_buffer_pool_size';  # 缓冲池大小（通常设为物理内存60-80%）
      SHOW VARIABLES LIKE 'innodb_log_file_size';
      SHOW VARIABLES LIKE 'character_set%';           # 字符集配置
      SHOW VARIABLES LIKE 'collation%';

  - title: "表维护 - OPTIMIZE / ANALYZE / CHECK"
    type: mysql
    tags: [optimize, analyze, check, repair, maintenance, fragmentation]
    source: "MySQL 8.0 官方参考手册 - 表维护"
    source_url: "https://dev.mysql.com/doc/refman/8.0/en/optimize-table.html"
    version: "5.7,8.0,8.4"
    content: |
      # 表维护
      # OPTIMIZE TABLE: https://dev.mysql.com/doc/refman/8.0/en/optimize-table.html
      # ANALYZE TABLE: https://dev.mysql.com/doc/refman/8.0/en/analyze-table.html

      ## ANALYZE TABLE（更新统计信息，让优化器做出更好的执行计划）
      ANALYZE TABLE orders;
      ANALYZE TABLE mydb.orders;
      # 注意: InnoDB 会在后台自动维护统计信息，手动执行用于索引变化后立即更新

      ## OPTIMIZE TABLE（整理碎片，回收空间）
      OPTIMIZE TABLE orders;
      # 适用场景: 大量 DELETE/UPDATE 后产生碎片
      # 注意: InnoDB 的 OPTIMIZE TABLE 实际上是重建表（ALTER TABLE + RENAME），
      #       执行期间会锁表（大表建议用 pt-online-schema-change）
      # MyISAM: 真正的碎片整理

      ## CHECK TABLE（检查表完整性）
      CHECK TABLE orders;
      CHECK TABLE orders EXTENDED;        # 更彻底的检查

      ## REPAIR TABLE（修复损坏的表，仅 MyISAM/ARCHIVE）
      REPAIR TABLE orders;
      # InnoDB 损坏时需要用 innodb_force_recovery 参数恢复，不能用 REPAIR

      ## 查看表碎片率
      SELECT
        table_name,
        ROUND(data_free / 1024 / 1024, 2) AS `free_MB`,
        ROUND(data_length / 1024 / 1024, 2) AS `data_MB`,
        ROUND(data_free / (data_length + data_free) * 100, 2) AS `frag_pct`
      FROM information_schema.tables
      WHERE table_schema = 'mydb'
        AND data_free > 0
      ORDER BY data_free DESC;
