# Docker 命令知识库
# 来源: https://docs.docker.com/reference/cli/docker/
# 版本覆盖: Docker Engine 24.x-27.x, Docker Compose v2.x

knowledge_items:

  - title: "docker run - 运行容器（资源限制）"
    type: docker
    tags: [docker run, memory, cpu, restart, port, volume, env]
    source: "Docker 官方文档"
    source_url: "https://docs.docker.com/reference/cli/docker/container/run/"
    content: |
      # docker run - 创建并运行容器
      # 官方文档: https://docs.docker.com/reference/cli/docker/container/run/
      # 资源约束: https://docs.docker.com/config/containers/resource_constraints/

      ## 基础用法
      docker run nginx:1.27                        # 前台运行
      docker run -d nginx:1.27                     # 后台运行（-d/--detach）
      docker run -d --name my-nginx nginx:1.27     # 指定容器名

      ## 端口映射（-p 宿主机:容器）
      docker run -d -p 80:80 nginx:1.27
      docker run -d -p 127.0.0.1:80:80 nginx:1.27  # 只绑定本机（推荐生产）
      docker run -d -p 8080-8090:8080-8090 app      # 端口范围

      ## 资源限制
      docker run -d \
        --name myapp \
        --memory="512m" \
        --memory-swap="512m" \
        --cpus="0.5" \
        myimage:latest
      # --memory: 硬限制（b/k/m/g，如 512m）
      # --memory-swap 等于 --memory 时表示禁用 swap
      # --cpus="0.5" 允许使用半个 CPU 核
      # --cpu-shares=512 软权重（默认1024）

      ## 环境变量
      docker run -d -e MYSQL_ROOT_PASSWORD=secret mysql:8.0
      docker run -d --env-file .env myapp:latest

      ## Volume 挂载
      docker run -d -v myvolume:/app/data nginx          # named volume
      docker run -d -v /host/path:/app/data nginx        # bind mount
      docker run -d -v /host/path:/app/data:ro nginx     # 只读

      ## 重启策略
      # https://docs.docker.com/config/containers/start-containers-automatically/
      docker run -d --restart no              nginx   # 不重启（默认）
      docker run -d --restart always          nginx   # 始终重启
      docker run -d --restart unless-stopped  nginx   # 除非手动停止
      docker run -d --restart on-failure:3    nginx   # 失败时最多重启3次

      ## 生产级示例
      docker run -d \
        --name webapp \
        --restart unless-stopped \
        --memory="1g" --memory-swap="1g" \
        --cpus="1.0" \
        -p 127.0.0.1:8080:8080 \
        -v /data/webapp:/app/data \
        -e APP_ENV=production \
        --env-file /etc/webapp/.env \
        --log-driver json-file \
        --log-opt max-size=50m \
        --log-opt max-file=3 \
        webapp:1.0.0

  - title: "容器日志与监控"
    type: docker
    tags: [logs, stats, inspect, events]
    source: "Docker 官方文档"
    source_url: "https://docs.docker.com/reference/cli/docker/container/logs/"
    content: |
      # 容器日志与监控
      # 官方文档: https://docs.docker.com/reference/cli/docker/container/logs/

      ## 查看日志
      docker logs myapp                     # 全部日志
      docker logs -f myapp                  # 实时跟踪（-f/--follow）
      docker logs --tail=100 myapp          # 最后100行
      docker logs --since 1h myapp          # 最近1小时
      docker logs --since "2024-01-01T00:00:00" --until "2024-01-02T00:00:00" myapp
      docker logs --timestamps myapp        # 显示时间戳
      docker logs -f --tail=50 myapp 2>&1   # 含 stderr

      ## 资源使用监控
      docker stats                          # 实时监控所有容器
      docker stats myapp                    # 指定容器
      docker stats --no-stream              # 输出一次（脚本用）
      docker stats --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.NetIO}}"

      ## 容器详情
      docker inspect myapp                  # 完整 JSON 配置
      docker inspect --format='{{.State.Status}}' myapp
      docker inspect --format='{{.NetworkSettings.IPAddress}}' myapp
      docker inspect --format='{{json .HostConfig.PortBindings}}' myapp

      ## 进入容器
      docker exec -it myapp /bin/bash       # bash
      docker exec -it myapp /bin/sh         # sh（Alpine 等）
      docker exec myapp cat /app/config.yaml   # 非交互
      docker exec -u root myapp bash        # 以 root 用户

      ## 复制文件
      docker cp myapp:/app/log.txt ./       # 容器→宿主机
      docker cp ./config.yaml myapp:/app/   # 宿主机→容器

  - title: "镜像管理 - build/push/pull"
    type: docker
    tags: [image, build, push, pull, tag, registry, multi-platform]
    source: "Docker 官方文档"
    source_url: "https://docs.docker.com/reference/cli/docker/image/"
    content: |
      # 镜像管理
      # 官方文档: https://docs.docker.com/reference/cli/docker/image/

      ## 构建镜像
      docker build -t myapp:1.0.0 .
      docker build -t myapp:1.0.0 -f deploy/Dockerfile .
      docker build --no-cache -t myapp:1.0.0 .       # 不使用缓存
      docker build --build-arg VERSION=1.0 -t myapp .  # 传入构建参数

      ## 多平台构建（buildx，Docker 19.03+）
      docker buildx create --use
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        -t myregistry/myapp:1.0.0 \
        --push .

      ## 查看镜像
      docker images
      docker images --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}\t{{.CreatedAt}}"
      docker image ls --digests               # 显示 digest
      docker history myapp:1.0.0             # 构建层历史

      ## 标签与推送
      docker login registry.example.com
      docker tag myapp:1.0.0 registry.example.com/myapp:1.0.0
      docker push registry.example.com/myapp:1.0.0

      ## 删除镜像
      docker rmi myapp:1.0.0
      docker image prune                     # 删除悬空镜像
      docker image prune -a                  # 删除所有未使用镜像

      ## 离线传输
      docker save -o myapp.tar myapp:1.0.0
      docker load -i myapp.tar

  - title: "Docker Compose v2 完整参考"
    type: docker
    tags: [compose, docker-compose, up, down, scale, logs]
    source: "Docker 官方文档 - Compose"
    source_url: "https://docs.docker.com/compose/reference/"
    content: |
      # Docker Compose v2
      # 官方文档: https://docs.docker.com/compose/reference/
      # Compose file spec: https://docs.docker.com/compose/compose-file/
      # 注意: v2 命令是 "docker compose"（空格），v1 是 "docker-compose"（连字符）

      ## 基础操作
      docker compose up -d                  # 后台启动全部服务
      docker compose up -d --build          # 先构建再启动
      docker compose up -d app db           # 只启动指定服务
      docker compose down                   # 停止并删除容器（保留 volume）
      docker compose down -v                # 同时删除 volume（危险！）
      docker compose down --rmi all         # 同时删除镜像
      docker compose start / stop / restart

      ## 查看与日志
      docker compose ps
      docker compose logs -f                # 所有服务日志实时跟踪
      docker compose logs -f --tail=100 app
      docker compose top                    # 查看服务进程

      ## 执行与扩缩容
      docker compose exec app bash
      docker compose exec -T app ls /app    # 非 TTY
      docker compose up -d --scale worker=3 # 扩缩容

      ## 常用部署命令
      docker compose pull && docker compose up -d   # 拉取最新镜像并重启

      ## compose.yaml 生产级示例
      # version: "3.9"  (Docker Engine 19.03+)
      # 完整 spec: https://docs.docker.com/compose/compose-file/
