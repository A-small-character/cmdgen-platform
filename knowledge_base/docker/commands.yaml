  - title: "生产级多阶段 Dockerfile"
    type: docker
    tags: [dockerfile, multi-stage, go, node, python, distroless, best-practice]
    source: "Docker 官方文档 - Dockerfile best practices"
    source_url: "https://docs.docker.com/develop/develop-images/dockerfile_best-practices/"
    content: |
      # 生产级多阶段 Dockerfile
      # 官方文档: https://docs.docker.com/develop/develop-images/multistage-build/
      # 最佳实践: https://docs.docker.com/develop/develop-images/dockerfile_best-practices/

      ## Go 应用（使用 distroless 基础镜像）
      FROM golang:1.24-alpine AS builder
      RUN apk add --no-cache git ca-certificates tzdata
      WORKDIR /build
      COPY go.mod go.sum ./
      RUN go mod download
      COPY . .
      RUN CGO_ENABLED=0 GOOS=linux go build \
          -ldflags="-w -s" -trimpath \
          -o app ./cmd/server

      FROM gcr.io/distroless/static-debian12:nonroot
      COPY --from=builder /build/app /app
      COPY --from=builder /etc/ssl/certs/ca-certificates.crt /etc/ssl/certs/
      EXPOSE 8080
      ENTRYPOINT ["/app"]

      ## Node.js 应用
      FROM node:20-alpine AS deps
      WORKDIR /app
      COPY package*.json ./
      RUN npm ci --only=production

      FROM node:20-alpine AS builder
      WORKDIR /app
      COPY package*.json ./
      RUN npm ci
      COPY . .
      RUN npm run build

      FROM node:20-alpine AS runner
      ENV NODE_ENV=production
      RUN addgroup -S nodejs && adduser -S nextjs -G nodejs
      WORKDIR /app
      COPY --from=deps    /app/node_modules ./node_modules
      COPY --from=builder /app/dist         ./dist
      USER nextjs
      EXPOSE 3000
      CMD ["node", "dist/main.js"]

      ## Dockerfile 最佳实践要点
      # 1. 使用精确的镜像版本标签，避免 latest
      # 2. 将变化少的层（如 RUN apt install）放前面，利用缓存
      # 3. 合并 RUN 命令减少层数
      # 4. 使用 .dockerignore 排除不必要文件
      # 5. 以非 root 用户运行应用
      # 6. 只复制需要的文件，最小化镜像

  - title: "网络和 Volume 管理"
    type: docker
    tags: [network, volume, bridge, backup]
    source: "Docker 官方文档"
    source_url: "https://docs.docker.com/network/"
    content: |
      # Docker 网络和 Volume
      # 网络文档: https://docs.docker.com/network/
      # Volume 文档: https://docs.docker.com/storage/volumes/

      ## 网络管理
      docker network create mynet
      docker network create \
        --driver bridge \
        --subnet 172.20.0.0/16 \
        --gateway 172.20.0.1 \
        mynet
      docker network ls
      docker network inspect mynet
      docker network connect mynet myapp       # 将容器加入网络
      docker network disconnect mynet myapp
      docker network prune                     # 删除未使用网络

      ## 容器间通信（同一自定义网络可用容器名互通）
      docker network create app-net
      docker run -d --name db  --network app-net mysql:8.0
      docker run -d --name app --network app-net \
        -e DB_HOST=db myapp:latest   # 直接用 "db" 作为主机名

      ## Volume 管理
      docker volume create mydata
      docker volume ls
      docker volume inspect mydata
      docker volume rm mydata
      docker volume prune                      # 删除未使用 volume

      ## 备份 Volume（官方推荐方式）
      docker run --rm \
        -v mydata:/source:ro \
        -v $(pwd):/backup \
        alpine \
        tar czf /backup/backup-$(date +%Y%m%d).tar.gz -C /source .

      ## 恢复 Volume
      docker run --rm \
        -v mydata:/target \
        -v $(pwd):/backup:ro \
        alpine \
        tar xzf /backup/backup-20240101.tar.gz -C /target

  - title: "系统清理"
    type: docker
    tags: [prune, cleanup, disk, system]
    source: "Docker 官方文档"
    source_url: "https://docs.docker.com/reference/cli/docker/system/prune/"
    content: |
      # Docker 系统清理
      # 官方文档: https://docs.docker.com/reference/cli/docker/system/prune/

      ## 查看磁盘使用
      docker system df
      docker system df -v             # 详细列表

      ## 清理（按需选择，生产环境确认后执行）
      docker system prune             # 清理停止容器+悬空镜像+未用网络
      docker system prune -a          # 同上 + 所有未使用镜像
      docker system prune -a --volumes -f   # 同上 + 未用 volume（危险！）

      ## 分类清理
      docker container prune          # 已停止容器
      docker image prune              # 悬空镜像（无标签）
      docker image prune -a           # 所有未使用镜像
      docker volume prune             # 未使用 volume（危险！）
      docker network prune            # 未使用网络

      ## 按时间过滤清理
      docker image prune -a --filter "until=24h"
      docker container prune --filter "until=24h"
