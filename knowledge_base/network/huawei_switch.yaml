  - title: "OSPF 配置（华为 VRP）"
    type: network
    vendor: huawei
    tags: [ospf, routing, area, huawei, authentication]
    source: "华为企业网络产品文档 - OSPF 配置"
    source_url: "https://support.huawei.com/enterprise/zh/doc/EDOC1100021771"
    version: "VRP V200R003C00 及以上"
    content: |
      # 华为设备 OSPF 配置
      # 官方文档: https://support.huawei.com/enterprise/zh/doc/EDOC1100021771

      ## 基础 OSPF（单区域，Area 0）
      system-view
      ospf 1 router-id 1.1.1.1
       area 0.0.0.0
        network 192.168.1.0 0.0.0.255
        network 10.0.0.0 0.0.0.3
       quit
      quit

      ## MD5 认证
      ospf 1
       area 0.0.0.0
        authentication-mode md5 1 cipher Admin@123
       quit
      quit

      ## Stub 区域
      ospf 1
       area 1
        stub
       quit
      quit

      ## 被动接口（不发 Hello 包，用于连接终端网段）
      ospf 1
       silent-interface GigabitEthernet0/0/0
      quit

      ## 修改 OSPF 接口 Cost
      interface GigabitEthernet0/0/1
       ospf cost 100
      quit

      ## 查看 OSPF 状态
      display ospf peer
      display ospf peer brief
      display ospf routing
      display ospf lsdb
      display ospf interface

  - title: "OSPF 配置（Cisco IOS）"
    type: network
    vendor: cisco
    tags: [ospf, routing, area, cisco, authentication]
    source: "Cisco IOS IP Routing: OSPF Configuration Guide"
    source_url: "https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/iproute_ospf/configuration/xe-16/iro-xe-16-book/iro-cfg.html"
    version: "IOS 15.x, IOS-XE 16.x 及以上"
    content: |
      # Cisco 设备 OSPF 配置
      # 官方文档: https://www.cisco.com/c/en/us/support/docs/ip/open-shortest-path-first-ospf/7039-1.html

      ## 基础 OSPF
      configure terminal
      router ospf 1
       router-id 1.1.1.1
       network 192.168.1.0 0.0.0.255 area 0
       network 10.0.0.0 0.0.0.3 area 0
       exit

      ## MD5 认证（接口级别）
      interface GigabitEthernet0/0
       ip ospf authentication message-digest
       ip ospf message-digest-key 1 md5 Admin@123
       exit

      ## 被动接口
      router ospf 1
       passive-interface GigabitEthernet0/1
       exit

      ## 查看 OSPF
      show ip ospf neighbor
      show ip ospf database
      show ip route ospf

  - title: "BGP 配置（华为 VRP）"
    type: network
    vendor: huawei
    tags: [bgp, routing, ebgp, ibgp, huawei, as]
    source: "华为企业网络产品文档 - BGP 配置"
    source_url: "https://support.huawei.com/enterprise/zh/doc/EDOC1100021771"
    version: "VRP V200R003C00 及以上"
    content: |
      # 华为设备 BGP 配置
      # 官方文档: https://support.huawei.com/enterprise/zh/doc/EDOC1100021771

      ## 基础 BGP 配置
      system-view
      bgp 65001                                   # 本地 AS 号
       router-id 1.1.1.1
       # eBGP 对等体（不同 AS）
       peer 203.0.113.1 as-number 65002
       peer 203.0.113.1 description ISP-Peer
       peer 203.0.113.1 ebgp-max-hop 2            # 非直连 eBGP 需配置
       # iBGP 对等体（相同 AS）
       peer 10.0.0.2 as-number 65001
       peer 10.0.0.2 connect-interface LoopBack0
       # 发布路由
       network 192.168.100.0 255.255.255.0
       ipv4-family unicast
        peer 203.0.113.1 enable
        peer 10.0.0.2 enable
       quit
      quit

      ## 查看 BGP 状态
      display bgp peer
      display bgp routing-table
      display bgp routing-table peer 203.0.113.1 received-routes
      display bgp routing-table peer 203.0.113.1 advertised-routes

