  # ══════════════════════════════════════════════════════
  # VLAN 配置
  # ══════════════════════════════════════════════════════

  - title: "VLAN 配置（华为 VRP）"
    type: network
    vendor: huawei
    tags: [vlan, huawei, vrp, switch, trunk, access, hybrid]
    source: "华为企业网络产品文档 - VRP VLAN 配置"
    source_url: "https://support.huawei.com/enterprise/zh/doc/EDOC1100021771"
    version: "VRP V200R003C00 及以上"
    content: |
      # 华为交换机 VLAN 配置（VRP 系统）
      # 官方文档: https://support.huawei.com/enterprise/zh/doc/EDOC1100021771

      ## 创建 VLAN
      system-view
      vlan 100
       description SERVERS
      quit
      # 或批量创建
      vlan batch 100 200 300 400

      ## Access 接口（连接终端设备，发出时去 Tag）
      interface GigabitEthernet0/0/1
       port link-type access
       port default vlan 100
       description Server-1
      quit

      ## Trunk 接口（连接交换机/路由器，允许多个 VLAN 通过，携带 Tag）
      interface GigabitEthernet0/0/24
       port link-type trunk
       port trunk pvid vlan 1
       port trunk allow-pass vlan 100 200 300
       # 允许所有 VLAN:
       # port trunk allow-pass vlan all
      quit

      ## Hybrid 接口（华为特有，可同时配置 tagged 和 untagged）
      interface GigabitEthernet0/0/2
       port link-type hybrid
       port hybrid pvid vlan 100
       port hybrid untagged vlan 100
       port hybrid tagged vlan 200 300
      quit

      ## VLANIF 三层接口（VLAN 网关）
      interface Vlanif100
       ip address 192.168.100.1 255.255.255.0
       description SERVERS-GW
      quit

      ## 查看 VLAN 信息
      display vlan
      display vlan 100 verbose
      display port vlan active
      display interface GigabitEthernet0/0/1

  - title: "VLAN 配置（Cisco IOS）"
    type: network
    vendor: cisco
    tags: [vlan, cisco, ios, switch, trunk, access, svi]
    source: "Cisco IOS Configuration Guide - VLANs"
    source_url: "https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9200/software/release/17-6/configuration_guide/vlan/b_176_vlan_9200_cg/configuring_vlans.html"
    version: "IOS 15.x, IOS-XE 16.x 及以上"
    content: |
      # Cisco 交换机 VLAN 配置（IOS/IOS-XE）
      # 官方文档: https://www.cisco.com/c/en/us/support/docs/lan-switching/ethernet/10023-3.html

      ## 创建 VLAN（VLAN 数据库模式）
      configure terminal
      vlan 100
       name SERVERS
      vlan 200
       name USERS
      exit

      ## Access 接口
      interface GigabitEthernet1/0/1
       description Server-1
       switchport mode access
       switchport access vlan 100
       spanning-tree portfast
       exit

      ## Trunk 接口
      interface GigabitEthernet1/0/48
       description Uplink-to-Core
       switchport mode trunk
       switchport trunk native vlan 1
       switchport trunk allowed vlan 100,200,300
       exit

      ## SVI 三层接口（Switched Virtual Interface）
      interface Vlan100
       description SERVERS-GW
       ip address 192.168.100.1 255.255.255.0
       no shutdown
       exit

      ## 查看 VLAN
      show vlan brief
      show vlan id 100
      show interfaces GigabitEthernet1/0/1 switchport
      show interfaces trunk

  - title: "VLAN 配置（H3C Comware 7）"
    type: network
    vendor: h3c
    tags: [vlan, h3c, comware, switch, trunk, access]
    source: "H3C Comware 7 配置指南 - VLAN"
    source_url: "https://www.h3c.com/cn/Support/Resource_Center/CN/Switches/Catalog/S5130/"
    version: "Comware V7"
    content: |
      # H3C 交换机 VLAN 配置（Comware 7）
      # 官方文档: H3C Comware 7 Layer 2 - LAN Access Configuration Guide

      ## 创建 VLAN
      system-view
      vlan 100
       name SERVERS
       quit

      ## Access 接口
      interface GigabitEthernet1/0/1
       description Server-1
       port link-type access
       port access vlan 100
       quit

      ## Trunk 接口
      interface GigabitEthernet1/0/24
       description Uplink
       port link-type trunk
       port trunk permit vlan 100 200 300
       # 或允许所有 VLAN
       # port trunk permit vlan all
       quit

      ## VLAN 接口（三层网关）
      interface Vlan-interface 100
       description SERVERS-GW
       ip address 192.168.100.1 24
       quit

      ## 查看
      display vlan 100
      display port trunk
      display interface GigabitEthernet1/0/1

