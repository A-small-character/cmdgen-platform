  - title: "ACL 访问控制列表（华为 VRP）"
    type: network
    vendor: huawei
    tags: [acl, access-control, filter, security, huawei]
    source: "华为企业网络产品文档 - ACL 配置"
    source_url: "https://support.huawei.com/enterprise/zh/doc/EDOC1100021771"
    version: "VRP V200R003C00 及以上"
    content: |
      # 华为设备 ACL（访问控制列表）
      # 官方文档: https://support.huawei.com/enterprise/zh/doc/EDOC1100021771
      # ACL 编号规范:
      # 2000-2999: 基本 ACL（只匹配源IP）
      # 3000-3999: 高级 ACL（匹配源/目的IP、协议、端口）
      # 4000-4999: 二层 ACL（匹配 MAC 地址）

      ## 基本 ACL（只匹配源 IP）
      system-view
      acl number 2000
       rule 5  permit source 192.168.1.0 0.0.0.255   # 允许 192.168.1.0/24
       rule 10 deny   source any                       # 拒绝其他
      quit

      ## 高级 ACL（匹配源/目的 IP + 协议 + 端口）
      acl number 3000
       rule 5  permit tcp source 192.168.1.0 0.0.0.255 destination 10.0.0.1 0 destination-port eq 80
       rule 10 permit tcp source 192.168.1.0 0.0.0.255 destination 10.0.0.1 0 destination-port eq 443
       rule 15 deny   ip
      quit

      ## 在接口应用 ACL（入方向过滤）
      interface GigabitEthernet0/0/1
       traffic-filter inbound acl 3000
      quit

      ## 查看 ACL
      display acl 3000
      display acl all
      display traffic-filter applied-record

  - title: "ACL 配置（Cisco IOS）"
    type: network
    vendor: cisco
    tags: [acl, access-list, filter, security, cisco]
    source: "Cisco IOS Security Configuration Guide - ACL"
    source_url: "https://www.cisco.com/c/en/us/support/docs/security/ios-firewall/23602-confaccesslists.html"
    version: "IOS 15.x, IOS-XE 16.x 及以上"
    content: |
      # Cisco ACL 配置
      # 官方文档: https://www.cisco.com/c/en/us/support/docs/security/ios-firewall/23602-confaccesslists.html

      ## 标准 ACL（编号 1-99 或 1300-1999，只匹配源 IP）
      configure terminal
      ip access-list standard ALLOW-LAN
       permit 192.168.1.0 0.0.0.255
       deny   any
       exit

      ## 扩展 ACL（编号 100-199 或 2000-2699，匹配源/目的+协议+端口）
      ip access-list extended WEB-FILTER
       permit tcp 192.168.1.0 0.0.0.255 host 10.0.0.1 eq 80
       permit tcp 192.168.1.0 0.0.0.255 host 10.0.0.1 eq 443
       deny   ip any any log
       exit

      ## 在接口应用 ACL
      interface GigabitEthernet0/0
       ip access-group WEB-FILTER in     # in: 入方向; out: 出方向
       exit

      ## 查看 ACL
      show ip access-lists
      show ip access-lists WEB-FILTER
      show ip interface GigabitEthernet0/0 | include access list

