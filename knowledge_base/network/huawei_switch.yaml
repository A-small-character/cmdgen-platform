  - title: "NAT 配置（华为 VRP）"
    type: network
    vendor: huawei
    tags: [nat, pat, snat, dnat, huawei, internet]
    source: "华为企业网络产品文档 - NAT 配置"
    source_url: "https://support.huawei.com/enterprise/zh/doc/EDOC1100021771"
    version: "VRP V200R003C00 及以上"
    content: |
      # 华为设备 NAT 配置
      # 官方文档: https://support.huawei.com/enterprise/zh/doc/EDOC1100021771

      ## Easy IP（出口 NAT，使用接口 IP，适合动态公网 IP）
      system-view
      # 定义内网地址范围（基本 ACL）
      acl number 2000
       rule 5 permit source 192.168.0.0 0.0.255.255
      quit
      # 在外网接口开启 Easy IP
      interface GigabitEthernet0/0/0
       nat outbound 2000
      quit

      ## Static NAT（1:1 静态映射）
      # 将内网 192.168.1.10 映射到公网 203.0.113.10
      nat static global 203.0.113.10 inside 192.168.1.10

      ## NAPT / PAT（地址池 + 端口复用）
      # 创建 NAT 地址池
      nat address-group 1 203.0.113.20 203.0.113.30
      # 在外网接口应用（PAT 模式）
      interface GigabitEthernet0/0/0
       nat outbound 2000 address-group 1 no-pat   # no-pat: 不复用端口（1:1）
       # 或 PAT 模式（端口复用，节省公网 IP）
       nat outbound 2000 address-group 1
      quit

      ## 查看 NAT
      display nat session all
      display nat static
      display nat outbound

  - title: "NAT 配置（Cisco IOS）"
    type: network
    vendor: cisco
    tags: [nat, pat, overload, static, cisco]
    source: "Cisco NAT Configuration Guide"
    source_url: "https://www.cisco.com/c/en/us/support/docs/ip/network-address-translation-nat/13772-12.html"
    version: "IOS 15.x, IOS-XE 16.x 及以上"
    content: |
      # Cisco NAT / PAT 配置
      # 官方文档: https://www.cisco.com/c/en/us/support/docs/ip/network-address-translation-nat/13772-12.html

      ## PAT（端口复用 NAT，共用一个出口 IP）
      configure terminal
      # 定义内网范围
      ip access-list standard NAT-ACL
       permit 192.168.0.0 0.0.255.255
       exit
      # 在内网接口标记 inside
      interface GigabitEthernet0/1
       ip nat inside
       exit
      # 在外网接口标记 outside
      interface GigabitEthernet0/0
       ip nat outside
       exit
      # 开启 PAT（overload = 端口复用）
      ip nat inside source list NAT-ACL interface GigabitEthernet0/0 overload

      ## Static NAT（静态 1:1 映射）
      ip nat inside source static 192.168.1.10 203.0.113.10

      ## 端口转发（DNAT，将公网端口映射到内网服务）
      ip nat inside source static tcp 192.168.1.20 80 203.0.113.10 80
      ip nat inside source static tcp 192.168.1.20 443 203.0.113.10 443

      ## 查看 NAT
      show ip nat translations
      show ip nat statistics
      clear ip nat translation *           # 清除 NAT 会话表（慎用）

  # ══════════════════════════════════════════════════════
  # 链路聚合
  # ══════════════════════════════════════════════════════

  - title: "链路聚合（华为 VRP - ETH-Trunk）"
    type: network
    vendor: huawei
    tags: [lacp, eth-trunk, link-aggregation, lag, huawei, bond]
    source: "华为企业网络产品文档 - ETH-Trunk 配置"
    source_url: "https://support.huawei.com/enterprise/zh/doc/EDOC1100021771"
    version: "VRP V200R003C00 及以上"
    content: |
      # 华为设备链路聚合（ETH-Trunk）
      # 官方文档: https://support.huawei.com/enterprise/zh/doc/EDOC1100021771
      # 模式: LACP（动态协商，推荐）或 Manual（手动，静态）

      ## 创建 ETH-Trunk 并配置 LACP 模式
      system-view
      interface Eth-Trunk 1
       mode lacp-static                            # LACP 模式（推荐）
       # 或 manual load-balance（手动模式）
       trunkport GigabitEthernet 0/0/1
       trunkport GigabitEthernet 0/0/2
       max active-linknumber 2                     # 最大活跃链路数
       least active-linknumber 1                   # 最小活跃链路数（低于此告警）
       description Uplink-to-Core
      quit

      ## 在 ETH-Trunk 上配置 Trunk（传多个 VLAN）
      interface Eth-Trunk 1
       port link-type trunk
       port trunk allow-pass vlan 100 200 300
      quit

      ## 查看 ETH-Trunk
      display eth-trunk 1
      display lacp statistics eth-trunk 1

  - title: "链路聚合（Cisco IOS - Port-Channel）"
    type: network
    vendor: cisco
    tags: [lacp, port-channel, etherchannel, lag, cisco]
    source: "Cisco EtherChannel Configuration Guide"
    source_url: "https://www.cisco.com/c/en/us/support/docs/lan-switching/etherchannel/98469-ios-etherchannel.html"
    version: "IOS 15.x, IOS-XE 16.x 及以上"
    content: |
      # Cisco EtherChannel（链路聚合）
      # 官方文档: https://www.cisco.com/c/en/us/support/docs/lan-switching/etherchannel/98469-ios-etherchannel.html

      ## 创建 Port-Channel（LACP 模式，推荐）
      configure terminal
      interface range GigabitEthernet1/0/1-2
       channel-group 1 mode active          # active: 主动 LACP; passive: 被动 LACP
       exit
      # 在 Port-Channel 接口上配置
      interface Port-channel1
       description Uplink-to-Core
       switchport mode trunk
       switchport trunk allowed vlan 100,200,300
       exit

      ## 静态聚合（On 模式，不协商）
      interface range GigabitEthernet1/0/3-4
       channel-group 2 mode on
       exit

      ## 查看 EtherChannel
      show etherchannel summary
      show etherchannel 1 detail
      show lacp neighbor
