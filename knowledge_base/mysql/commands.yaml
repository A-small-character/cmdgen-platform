# 来源: https://dev.mysql.com/doc/refman/8.0/en/  https://dev.mysql.com/doc/refman/8.4/en/
# 版本基线: MySQL 5.7 / 8.0 / 8.4
knowledge_items:

  - title: "MySQL用户与权限管理"
    type: mysql
    tags: ["user", "grant", "privilege", "security"]
    source: "MySQL官方文档"
    source_url: "https://dev.mysql.com/doc/refman/8.0/en/access-control.html"
    version: "MySQL 5.7, 8.0, 8.4"
    content: |
      # MySQL 用户与权限管理

      ## 创建用户
      -- MySQL 5.7 / 8.0 / 8.4 通用语法
      CREATE USER 'appuser'@'%'         IDENTIFIED BY 'SecureP@ss!';
      CREATE USER 'appuser'@'10.0.0.%'  IDENTIFIED BY 'SecureP@ss!';  -- 限制来源IP
      CREATE USER 'appuser'@'localhost' IDENTIFIED BY 'SecureP@ss!';

      -- MySQL 8.0+: 默认 caching_sha2_password 认证插件
      -- MySQL 5.7:  默认 mysql_native_password
      -- 指定认证插件（兼容旧客户端）
      CREATE USER 'appuser'@'%' IDENTIFIED WITH mysql_native_password BY 'SecureP@ss!';

      ## 授权（最小权限原则）
      -- 应用账号：只授予业务库的DML权限
      GRANT SELECT, INSERT, UPDATE, DELETE ON mydb.* TO 'appuser'@'%';
      -- 只读账号
      GRANT SELECT ON mydb.* TO 'readonly'@'%';
      -- 特定表权限
      GRANT SELECT ON mydb.orders TO 'report'@'%';
      -- 管理员（慎用ALL）
      GRANT ALL PRIVILEGES ON mydb.* TO 'admin'@'localhost';
      -- 授权后刷新
      FLUSH PRIVILEGES;

      ## 查看权限
      SHOW GRANTS FOR 'appuser'@'%';
      SELECT user, host, plugin, authentication_string
        FROM mysql.user
       WHERE user NOT IN ('root','mysql.sys','mysql.session','mysql.infoschema');

      ## 撤销权限
      REVOKE INSERT, UPDATE, DELETE ON mydb.* FROM 'appuser'@'%';

      ## 修改密码
      -- MySQL 8.0+
      ALTER USER 'appuser'@'%' IDENTIFIED BY 'NewP@ss!';
      -- 强制下次登录修改密码
      ALTER USER 'appuser'@'%' PASSWORD EXPIRE;

      ## 删除用户
      DROP USER IF EXISTS 'appuser'@'%';

      ## 版本差异
      -- 8.0→8.4: 主从术语规范化，但用户管理语法不变
      -- 8.0+: 支持 ROLES（角色）
      CREATE ROLE 'app_read', 'app_write';
      GRANT SELECT ON mydb.* TO 'app_read';
      GRANT SELECT, INSERT, UPDATE, DELETE ON mydb.* TO 'app_write';
      GRANT 'app_write' TO 'appuser'@'%';
      SET DEFAULT ROLE 'app_write' TO 'appuser'@'%';

  - title: "MySQL备份与恢复（mysqldump/xtrabackup/克隆插件）"
    type: mysql
    tags: ["backup", "restore", "mysqldump", "xtrabackup", "clone", "binlog"]
    source: "MySQL官方文档"
    source_url: "https://dev.mysql.com/doc/refman/8.0/en/backup-methods.html"
    version: "MySQL 5.7, 8.0, 8.4"
    content: |
      # MySQL 备份与恢复

      ## 1. mysqldump 逻辑备份

      ### 全量备份（推荐选项）
      mysqldump \
        -u root -p \
        --all-databases \
        --single-transaction \          # InnoDB一致性快照，不锁表
        --master-data=2 \               # 注释形式记录binlog位点(5.7/8.0)
        --source-data=2 \               # 8.4+新语法(等同master-data)
        --flush-logs \                  # 刷新binlog
        --triggers --routines --events \# 包含触发器、存储过程、事件
        --hex-blob \                    # 二进制字段用十六进制
        --set-gtid-purged=OFF \         # GTID环境下按需设置
        2>/dev/null \
        | gzip > /backup/full_$(date +%Y%m%d_%H%M%S).sql.gz

      ### 单库备份
      mysqldump -u root -p \
        --single-transaction \
        --databases mydb \
        | gzip > /backup/mydb_$(date +%Y%m%d_%H%M%S).sql.gz

      ### 恢复
      gunzip < /backup/full_20240101_020000.sql.gz | mysql -u root -p

      ## 2. mysqlbinlog 增量恢复（基于备份后的binlog）
      mysqlbinlog \
        --start-datetime="2024-01-01 10:00:00" \
        --stop-datetime="2024-01-01 11:00:00" \
        /var/lib/mysql/binlog.000123 \
        | mysql -u root -p

      ## 3. Percona XtraBackup 物理热备（推荐大数据量）
      # 全量备份
      xtrabackup --backup \
        --user=root --password='xxx' \
        --target-dir=/backup/full \
        --parallel=4

      # 增量备份
      xtrabackup --backup \
        --user=root --password='xxx' \
        --target-dir=/backup/inc1 \
        --incremental-basedir=/backup/full \
        --parallel=4

      # 恢复：先准备(prepare)再复制
      xtrabackup --prepare --target-dir=/backup/full
      xtrabackup --prepare --target-dir=/backup/full \
                 --incremental-dir=/backup/inc1
      systemctl stop mysqld
      xtrabackup --copy-back --target-dir=/backup/full
      chown -R mysql:mysql /var/lib/mysql
      systemctl start mysqld

      ## 4. MySQL Clone Plugin（8.0.17+，主从初始化最佳方案）
      -- 在donor安装插件
      INSTALL PLUGIN clone SONAME 'mysql_clone.so';
      -- 授权
      GRANT BACKUP_ADMIN ON *.* TO 'clone_user'@'%';
      GRANT CLONE_ADMIN ON *.* TO 'clone_user'@'%';

      -- 在recipient执行远程克隆（自动同步数据并重启）
      CLONE INSTANCE FROM 'clone_user'@'10.0.0.1':3306
        IDENTIFIED BY 'password';

      -- 查看克隆状态
      SELECT STATE, ERROR_NO, BINLOG_FILE, BINLOG_POSITION
        FROM performance_schema.clone_status;

  - title: "MySQL主从复制配置"
    type: mysql
    tags: ["replication", "master", "slave", "source", "replica", "gtid", "binlog"]
    source: "MySQL官方文档"
    source_url: "https://dev.mysql.com/doc/refman/8.0/en/replication.html"
    version: "MySQL 5.7, 8.0, 8.4"
    content: |
      # MySQL 主从复制

      ## 注意：MySQL 8.0.22+ 和 8.4 使用新术语
      ## MASTER → SOURCE，SLAVE → REPLICA
      ## 旧命令在8.4中已移除

      ## my.cnf — 主库配置
      [mysqld]
      server-id = 1                    # 集群内唯一
      log-bin = binlog                 # 开启binlog
      binlog_format = ROW              # ROW格式（推荐）
      binlog_row_image = FULL          # 完整行镜像
      sync_binlog = 1                  # 每次提交刷盘（强一致性）
      gtid_mode = ON                   # 开启GTID（推荐）
      enforce_gtid_consistency = ON
      expire_logs_days = 7             # binlog保留天数（5.7）
      binlog_expire_logs_seconds = 604800  # binlog保留秒数（8.0+）

      ## my.cnf — 从库配置
      [mysqld]
      server-id = 2                    # 与主库不同
      log-bin = binlog
      relay_log = relay-bin
      read_only = ON                   # 从库只读
      super_read_only = ON             # 防止super权限用户写入
      gtid_mode = ON
      enforce_gtid_consistency = ON
      log_replica_updates = ON         # 级联复制需要（8.0.26+新语法）

      ## 创建复制账号（主库执行）
      CREATE USER 'repl'@'%' IDENTIFIED WITH mysql_native_password BY 'ReplP@ss!';
      GRANT REPLICATION SLAVE ON *.* TO 'repl'@'%';
      FLUSH PRIVILEGES;

      ## 配置从库（GTID模式）
      -- MySQL 8.0.22 之前
      CHANGE MASTER TO
        MASTER_HOST='10.0.0.1',
        MASTER_PORT=3306,
        MASTER_USER='repl',
        MASTER_PASSWORD='ReplP@ss!',
        MASTER_AUTO_POSITION=1;    -- GTID自动定位

      -- MySQL 8.0.23+ / 8.4（新语法，推荐）
      CHANGE REPLICATION SOURCE TO
        SOURCE_HOST='10.0.0.1',
        SOURCE_PORT=3306,
        SOURCE_USER='repl',
        SOURCE_PASSWORD='ReplP@ss!',
        SOURCE_AUTO_POSITION=1;

      START REPLICA;   -- 8.0.22+（旧: START SLAVE）

      ## 查看复制状态
      SHOW REPLICA STATUS\G    -- 8.0.22+（旧: SHOW SLAVE STATUS\G）
      -- 关键字段:
      --   Replica_IO_Running: Yes
      --   Replica_SQL_Running: Yes
      --   Seconds_Behind_Source: 0   (延迟秒数)
      --   Last_Error: (空=正常)

      ## 跳过复制错误（谨慎使用）
      -- GTID模式下跳过一个事务
      STOP REPLICA SQL_THREAD;
      SET GTID_NEXT='xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx:N';
      BEGIN; COMMIT;
      SET GTID_NEXT='AUTOMATIC';
      START REPLICA SQL_THREAD;

  - title: "MySQL慢查询分析与优化"
    type: mysql
    tags: ["slow-query", "explain", "index", "performance", "optimization"]
    source: "MySQL官方文档"
    source_url: "https://dev.mysql.com/doc/refman/8.0/en/slow-query-log.html"
    version: "MySQL 5.7, 8.0, 8.4"
    content: |
      # MySQL 慢查询分析

      ## 1. 开启慢查询日志（动态修改，无需重启）
      SET GLOBAL slow_query_log = ON;
      SET GLOBAL slow_query_log_file = '/var/log/mysql/slow.log';
      SET GLOBAL long_query_time = 1;           -- 超过1秒记录
      SET GLOBAL log_queries_not_using_indexes = ON;   -- 记录全表扫描
      SET GLOBAL log_throttle_queries_not_using_indexes = 10;  -- 限制每分钟记录次数

      -- my.cnf持久化配置
      slow_query_log = 1
      slow_query_log_file = /var/log/mysql/slow.log
      long_query_time = 1
      log_queries_not_using_indexes = 1

      ## 2. 分析慢查询日志
      # mysqldumpslow（内置工具）
      mysqldumpslow -s t -t 10 /var/log/mysql/slow.log  # 按总时间排序，取Top10
      mysqldumpslow -s c -t 10 /var/log/mysql/slow.log  # 按执行次数排序

      # pt-query-digest（Percona Toolkit，推荐）
      pt-query-digest /var/log/mysql/slow.log | head -200
      pt-query-digest --since=24h /var/log/mysql/slow.log   # 最近24小时

      ## 3. EXPLAIN 分析执行计划
      EXPLAIN SELECT * FROM orders o
        JOIN users u ON o.user_id = u.id
       WHERE o.status = 'pending'
         AND o.created_at > '2024-01-01'\G

      -- 关键字段解读:
      -- type:   const>eq_ref>ref>range>index>ALL(全表扫描=需优化)
      -- key:    实际使用的索引
      -- rows:   预估扫描行数（越小越好）
      -- Extra:  Using index(覆盖索引) / Using filesort(排序需优化)
      --         Using temporary(需优化) / Using where(有过滤)

      -- MySQL 8.0+ EXPLAIN ANALYZE（实际执行+时间统计）
      EXPLAIN ANALYZE SELECT * FROM orders WHERE status='pending'\G

      ## 4. 索引管理
      -- 添加索引（小表直接ADD，大表使用pt-osc/gh-ost在线变更）
      ALTER TABLE orders ADD INDEX idx_status_created (status, created_at);
      ALTER TABLE orders ADD INDEX idx_user_status (user_id, status, created_at);

      -- 查看索引使用情况（information_schema）
      SELECT table_name, index_name, seq_in_index, column_name,
             cardinality, nullable
        FROM information_schema.STATISTICS
       WHERE table_schema = 'mydb'
         AND table_name = 'orders'
       ORDER BY table_name, index_name, seq_in_index;

      -- 查看未使用的索引（8.0 performance_schema）
      SELECT object_schema, object_name, index_name
        FROM performance_schema.table_io_waits_summary_by_index_usage
       WHERE index_name IS NOT NULL
         AND count_star = 0
         AND object_schema NOT IN ('mysql','performance_schema','information_schema')
       ORDER BY object_schema, object_name;

      -- 大表在线DDL（推荐pt-online-schema-change）
      pt-online-schema-change \
        --alter "ADD INDEX idx_status (status)" \
        --execute \
        D=mydb,t=orders,u=root,p=pass \
        --host=localhost

  - title: "MySQL InnoDB 关键参数调优"
    type: mysql
    tags: ["innodb", "buffer-pool", "redo-log", "tuning", "my.cnf"]
    source: "MySQL官方文档"
    source_url: "https://dev.mysql.com/doc/refman/8.0/en/innodb-parameters.html"
    version: "MySQL 5.7, 8.0, 8.4"
    content: |
      # MySQL InnoDB 关键参数（my.cnf）

      [mysqld]
      # ===== InnoDB Buffer Pool（最关键参数）=====
      # 建议设为物理内存的70-80%（专用MySQL服务器）
      innodb_buffer_pool_size = 16G
      # 多实例（内存>8G时，每个实例1-2G）
      innodb_buffer_pool_instances = 8
      # 预热：启动时自动加载热数据（8.0 GA）
      innodb_buffer_pool_dump_at_shutdown = ON
      innodb_buffer_pool_load_at_startup  = ON

      # ===== Redo Log =====
      # MySQL 8.0.30+ innodb_redo_log_capacity 替代旧参数
      innodb_redo_log_capacity = 4G          # 8.0.30+
      # MySQL 5.7 / 8.0.29:
      # innodb_log_file_size = 1G
      # innodb_log_files_in_group = 2

      # ===== 事务与持久性 =====
      innodb_flush_log_at_trx_commit = 1     # 1=每次提交刷盘（ACID）; 2=性能优先
      sync_binlog = 1                        # 1=每次提交刷binlog（ACID）
      innodb_flush_method = O_DIRECT         # 绕过OS缓存（Linux）
      innodb_doublewrite = ON                # 双写缓冲（防止部分页写入）

      # ===== 并发 =====
      innodb_thread_concurrency = 0          # 0=自动（推荐）
      innodb_read_io_threads  = 4
      innodb_write_io_threads = 4
      innodb_io_capacity      = 2000         # SSD：1000-4000；HDD：200
      innodb_io_capacity_max  = 4000

      # ===== 锁与超时 =====
      innodb_lock_wait_timeout = 10          # 锁等待超时（秒）
      innodb_deadlock_detect   = ON          # 死锁检测
      lock_wait_timeout = 30

      # ===== 表空间 =====
      innodb_file_per_table  = ON            # 每表独立表空间（推荐）
      innodb_stats_on_metadata = OFF         # 禁用元数据统计（减少LOCK）

      # ===== 连接 =====
      max_connections        = 500
      wait_timeout           = 600
      interactive_timeout    = 600
      max_allowed_packet     = 64M

      # ===== 字符集（MySQL 8.0默认utf8mb4）=====
      character-set-server   = utf8mb4
      collation-server       = utf8mb4_0900_ai_ci   # 8.0默认（不区分大小写，支持emoji）
      # collation-server     = utf8mb4_unicode_ci   # 5.7兼容

      # ===== 日志 =====
      log_error              = /var/log/mysql/error.log
      log_error_verbosity    = 2
      general_log            = OFF           # 生产关闭（记录所有SQL，性能影响大）
      slow_query_log         = ON
      long_query_time        = 1

      ## 查看当前InnoDB状态
      SHOW ENGINE INNODB STATUS\G
      SHOW GLOBAL STATUS LIKE 'Innodb_buffer_pool%';
      SELECT @@innodb_buffer_pool_size/1024/1024/1024 AS 'BufferPool(GB)';

  - title: "MySQL在线DDL（大表变更）"
    type: mysql
    tags: ["ddl", "alter", "online", "pt-osc", "gh-ost", "large-table"]
    source: "MySQL官方文档 + Percona/GitHub工具文档"
    source_url: "https://dev.mysql.com/doc/refman/8.0/en/innodb-online-ddl.html"
    version: "MySQL 5.7, 8.0, 8.4"
    content: |
      # MySQL 在线DDL — 大表变更方案

      ## 1. 原生 Online DDL（ALGORITHM=INPLACE）
      -- MySQL 5.6+ 支持，部分操作可以不锁表
      -- 语法：ALGORITHM=INPLACE, LOCK=NONE（最小锁）
      ALTER TABLE orders
        ADD COLUMN remark VARCHAR(500),
        ALGORITHM=INPLACE, LOCK=NONE;

      -- 检查哪些操作支持 INPLACE（官方文档 Online DDL Operations）
      -- 支持INPLACE+LOCK=NONE: 添加列、删除列、添加普通索引等
      -- 需要LOCK=SHARED: 添加全文索引等
      -- 需要LOCK=EXCLUSIVE(锁表): 更改列类型（隐式COPY）

      ## 2. pt-online-schema-change（小表<100GB推荐）
      -- 原理：创建影子表 → 同步存量数据 → 触发器同步增量 → rename交换
      pt-online-schema-change \
        --host=127.0.0.1 \
        --user=root --password='xxx' \
        --alter="ADD COLUMN remark VARCHAR(500), ADD INDEX idx_remark(remark(100))" \
        --execute \
        --progress=time,30 \          # 每30s输出进度
        --max-load="Threads_running=50" \   # 负载保护
        --critical-load="Threads_running=100" \
        --chunk-size=1000 \           # 每批处理行数
        --sleep=0.1 \                 # 每批间隔（减少主从延迟）
        D=mydb,t=orders

      ## 3. gh-ost（GitHub开源，生产环境大表首选）
      -- 原理：通过binlog流同步，不使用触发器，对主库影响更小
      gh-ost \
        --user="root" --password="xxx" \
        --host=127.0.0.1 \
        --database="mydb" --table="orders" \
        --alter="ADD COLUMN remark VARCHAR(500)" \
        --allow-on-master \           # 直接在主库执行（也可在从库）
        --chunk-size=1000 \
        --max-lag-millis=1500 \       # 主从延迟>1.5s暂停
        --max-load="Threads_running=30" \
        --throttle-control-replicas="10.0.0.2:3306" \
        --execute

      ## 4. 变更前检查（必做）
      -- 查看表大小
      SELECT table_schema, table_name,
             ROUND(data_length/1024/1024/1024, 2) AS 'Data(GB)',
             ROUND(index_length/1024/1024/1024, 2) AS 'Index(GB)',
             table_rows
        FROM information_schema.TABLES
       WHERE table_schema = 'mydb'
         AND table_name = 'orders';

      -- 查看当前锁情况
      SELECT * FROM performance_schema.data_locks\G
      SELECT * FROM information_schema.INNODB_TRX\G

  - title: "MySQL性能诊断速查"
    type: mysql
    tags: ["performance", "processlist", "status", "innodb", "diagnosis"]
    source: "MySQL官方文档"
    source_url: "https://dev.mysql.com/doc/refman/8.0/en/performance-schema.html"
    version: "MySQL 5.7, 8.0, 8.4"
    content: |
      # MySQL 性能诊断速查

      ## 查看当前连接与慢SQL
      SHOW PROCESSLIST;
      -- 或更详细（含完整SQL）
      SELECT id, user, host, db, command, time, state, info
        FROM information_schema.PROCESSLIST
       WHERE command != 'Sleep'
         AND time > 5
       ORDER BY time DESC;

      -- 8.0+ performance_schema（推荐）
      SELECT thread_id, processlist_id, processlist_user, processlist_host,
             processlist_db, processlist_command, processlist_time,
             processlist_state, processlist_info
        FROM performance_schema.threads
       WHERE processlist_command != 'Sleep'
       ORDER BY processlist_time DESC;

      ## 杀掉长事务/慢查询
      KILL QUERY  <process_id>;   -- 仅终止SQL，保持连接
      KILL        <process_id>;   -- 终止连接

      ## 查看InnoDB锁等待
      SELECT r.trx_id AS waiting_trx_id,
             r.trx_mysql_thread_id AS waiting_thread,
             r.trx_query AS waiting_query,
             b.trx_id AS blocking_trx_id,
             b.trx_mysql_thread_id AS blocking_thread,
             b.trx_query AS blocking_query
        FROM information_schema.INNODB_LOCK_WAITS w
        JOIN information_schema.INNODB_TRX r ON r.trx_id = w.requesting_trx_id
        JOIN information_schema.INNODB_TRX b ON b.trx_id = w.blocking_trx_id;

      -- 8.0+ 新版（performance_schema）
      SELECT * FROM performance_schema.data_lock_waits\G

      ## 全局状态统计
      -- QPS
      SHOW GLOBAL STATUS LIKE 'Questions';
      SHOW GLOBAL STATUS LIKE 'Com_select';
      SHOW GLOBAL STATUS LIKE 'Com_insert';
      SHOW GLOBAL STATUS LIKE 'Com_update';
      SHOW GLOBAL STATUS LIKE 'Com_delete';

      -- 连接
      SHOW GLOBAL STATUS LIKE 'Threads_connected';
      SHOW GLOBAL STATUS LIKE 'Threads_running';
      SHOW GLOBAL STATUS LIKE 'Max_used_connections';
      SHOW GLOBAL STATUS LIKE 'Aborted_connects';

      -- InnoDB Buffer Pool命中率（>99%为佳）
      SELECT ROUND(
        (1 - (
          (SELECT variable_value FROM performance_schema.global_status WHERE variable_name='Innodb_buffer_pool_reads') /
          (SELECT variable_value FROM performance_schema.global_status WHERE variable_name='Innodb_buffer_pool_read_requests')
        )) * 100, 2
      ) AS 'BufferPool_HitRate(%)';

      ## 查看表/索引统计信息
      ANALYZE TABLE orders;    -- 更新统计信息（优化器依赖）
      OPTIMIZE TABLE orders;   -- 重建表（InnoDB会RECREATE，慎用大表）
